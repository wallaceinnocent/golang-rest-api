name: Go Fiber CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          # This automatically handles caching for your go.sum dependencies
          # cache: true 

      - name: Install dependencies
        run: go mod download

      - name: Verify dependencies
        run: go mod verify

      - name: Run Tests
        # -race helps find concurrency issues, which is vital for web frameworks
        run: go test -v -race ./...
  build:
    name: Build Binary
    runs-on: ubuntu-latest
    needs: test # Only runs if tests pass
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25'
        cache: true
    
    - name: Build
      # This creates a binary named 'fiber-app' from your main.go
      run: go build -v -o fiber-app ./cmd/server/main.go
    
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: fiber-binary
        path: fiber-app
